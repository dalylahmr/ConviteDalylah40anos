<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista de Presentes — Dalylah 40 Anos</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #C9A84C;
  --black: #080808;
  --card: #141414;
  --red: #8B1A1A;
  --white: #FAF6EE;
  --dim: #C8C0B0;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--black); color: var(--white); font-family: 'Montserrat', sans-serif; }

#entrance { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #000; padding: 2rem; }
.entrance-box { text-align: center; max-width: 420px; width: 100%; border: 1px solid rgba(201,168,76,0.3); padding: 3rem 2rem; background: var(--card); }
.entrance-box h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; color: var(--gold); margin-bottom: 0.3rem; }
.entrance-box p { color: var(--dim); font-size: 0.85rem; margin-bottom: 2rem; }
.entrance-box input { width: 100%; padding: 0.7rem 1rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(201,168,76,0.3); color: var(--white); font-family: 'Playfair Display', serif; font-size: 1.1rem; font-style: italic; text-align: center; outline: none; margin-bottom: 1rem; }
.entrance-box input:focus { border-color: var(--gold); }
.entrance-box button { width: 100%; padding: 0.8rem; background: var(--red); border: 1px solid rgba(201,168,76,0.3); color: var(--gold); cursor: pointer; font-size: 0.75rem; letter-spacing: 0.3em; text-transform: uppercase; }
.entrance-box button:hover { background: #a82020; }

#main { display: none; max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }
#main.show { display: block; }

.page-header { text-align: center; padding: 2rem 0 1rem; border-bottom: 1px solid rgba(201,168,76,0.15); margin-bottom: 2rem; }
.page-header h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; color: var(--white); }
.page-header h1 em { color: var(--gold); font-style: italic; }
.page-header p { color: var(--dim); font-size: 0.85rem; margin-top: 0.5rem; }
.guest-line { color: var(--gold); font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase; margin-top: 0.5rem; }
.counter { display: inline-block; margin-top: 0.8rem; padding: 0.3rem 1rem; border: 1px solid rgba(139,26,26,0.4); color: var(--dim); font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; }

.category-section { margin-bottom: 3rem; }
.category-title { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--gold); margin-bottom: 1.2rem; padding-bottom: 0.5rem; border-bottom: 1px solid rgba(201,168,76,0.2); }

.items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1.2rem; }

.card { background: var(--card); border: 1px solid rgba(201,168,76,0.12); overflow: hidden; }
.card-img-wrap { position: relative; }
.img-placeholder { width: 100%; height: 140px; background: #1a1a1a; display: flex; align-items: center; justify-content: center; padding: 1rem; text-align: center; font-size: 0.7rem; color: rgba(200,192,176,0.4); font-style: italic; line-height: 1.5; border-bottom: 1px solid rgba(201,168,76,0.08); }
.card.is-reserved .card-img-wrap::after { content: 'Já escolhido'; position: absolute; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; font-size: 0.7rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold); }
.card-body { padding: 1rem; }
.card-name { font-family: 'Playfair Display', serif; font-size: 1rem; color: var(--white); margin-bottom: 0.3rem; }
.card-desc { font-size: 0.72rem; color: var(--dim); margin-bottom: 0.6rem; line-height: 1.5; }
.card-price { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--gold); margin-bottom: 0.6rem; }
.card-cota { font-size: 0.65rem; color: var(--dim); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.5rem; }
.card-link { font-size: 0.65rem; color: var(--dim); text-decoration: none; letter-spacing: 0.1em; text-transform: uppercase; border-bottom: 1px solid rgba(200,192,176,0.3); display: inline-block; margin-bottom: 0.6rem; }
.card-link:hover { color: var(--gold); }

.btn { width: 100%; padding: 0.65rem; font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; border: 1px solid; font-family: 'Montserrat', sans-serif; }
.btn-reserve { background: transparent; border-color: rgba(201,168,76,0.4); color: var(--gold); }
.btn-reserve:hover { background: rgba(201,168,76,0.1); }
.btn-mine { background: rgba(201,168,76,0.12); border-color: var(--gold); color: var(--gold); }
.btn-taken { background: rgba(139,26,26,0.1); border-color: rgba(139,26,26,0.3); color: var(--dim); cursor: not-allowed; }
.btn-cota { background: transparent; border-color: rgba(201,168,76,0.25); color: var(--dim); }
.btn-cota:hover { border-color: var(--gold); color: var(--gold); }
.btn-cota-mine { background: rgba(201,168,76,0.12); border-color: var(--gold); color: var(--gold); }

.admin-note { font-size: 0.65rem; color: var(--gold); background: rgba(201,168,76,0.08); border-left: 2px solid var(--gold); padding: 0.3rem 0.5rem; margin-bottom: 0.5rem; display: none; }
body.is-admin .admin-note { display: block; }

.pix-section { text-align: center; padding: 3rem 1rem; border-top: 1px solid rgba(201,168,76,0.1); margin-top: 2rem; }
.pix-section p { color: var(--dim); font-size: 0.85rem; font-style: italic; margin-bottom: 1rem; }
.pix-key { font-size: 0.85rem; color: var(--gold); background: rgba(201,168,76,0.07); border: 1px solid rgba(201,168,76,0.2); display: inline-block; padding: 0.6rem 1.5rem; }

#admin-panel { display: none; background: rgba(201,168,76,0.05); border: 1px solid rgba(201,168,76,0.2); padding: 1.5rem; margin-top: 2rem; }
body.is-admin #admin-panel { display: block; }
#admin-panel h2 { font-family: 'Playfair Display', serif; color: var(--gold); margin-bottom: 1rem; font-size: 1.2rem; }
.log-entry { font-size: 0.72rem; color: var(--dim); padding: 0.3rem 0; border-bottom: 1px solid rgba(201,168,76,0.08); font-family: monospace; }

#toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(200px); background: var(--card); border: 1px solid rgba(201,168,76,0.4); padding: 0.8rem 1.5rem; font-size: 0.75rem; letter-spacing: 0.15em; color: var(--gold); z-index: 9999; transition: transform 0.4s; pointer-events: none; }
#toast.show { transform: translateX(-50%) translateY(0); }

@media (max-width: 600px) { .items-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); } #main { padding: 1.5rem 1rem; } }
</style>
</head>
<body>

<div id="entrance">
  <div class="entrance-box">
    <h1>Wishlist</h1>
    <p>O Filme da Minha Vida</p>
    <input type="text" id="name-input" placeholder="Seu nome" maxlength="50" autocomplete="off">
    <button onclick="enter()">Entrar</button>
  </div>
</div>

<div id="main">
  <div class="page-header">
    <h1><em>Wishlist</em></h1>
    <p>O Filme da Minha Vida</p>
    <p class="guest-line">bem-vinda, <span id="guest-label"></span></p>
    <span class="counter" id="counter">&hellip;</span>
  </div>
  <div id="wishlist"></div>
  <section class="pix-section">
    <p>Se preferir, contribua com qualquer valor via Pix &mdash; recebido com muito carinho.</p>
    <div class="pix-key">Pix: (62) 98106-0232<br>Dalylah Rezende, Ita&uacute;</div>
  </section>
  <div id="admin-panel">
    <h2>Painel Administrativo</h2>
    <div id="log"></div>
  </div>
</div>

<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script src="wishlist-data.js?v=3"></script>
<script src="wishlist-app.js?v=3"></script>
</body>
</html>
