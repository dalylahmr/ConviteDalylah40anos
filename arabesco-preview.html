<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Preview Arabesco</title>
<style>
body{background:#111;display:flex;flex-wrap:wrap;gap:20px;padding:30px;align-items:flex-start;justify-content:center}
canvas{border:1px solid #333}
p{color:#C9A84C;font-family:sans-serif;font-size:12px;text-align:center;margin-top:6px}
div{display:flex;flex-direction:column;align-items:center}
</style>
</head>
<body>
<script>
function mk(label, fn) {
  const d = document.createElement('div');
  const c = document.createElement('canvas');
  c.width = 200; c.height = 200;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#1a1200';
  ctx.fillRect(0,0,200,200);
  fn(ctx, 200, 200);
  const p = document.createElement('p');
  p.textContent = label;
  d.appendChild(c); d.appendChild(p);
  document.body.appendChild(d);
}

mk('Opção 1 — Espiral', (ctx, w, h) => {
  ctx.strokeStyle = '#C9A84C';
  ctx.fillStyle = '#C9A84C';
  ctx.lineWidth = 1.5;
  function corner(ctx, ox, oy, sx, sy) {
    ctx.save();
    ctx.translate(ox, oy);
    ctx.scale(sx, sy);
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.bezierCurveTo(18,-2, 36,8, 42,0);
    ctx.bezierCurveTo(48,-8, 44,-18, 36,-16);
    ctx.bezierCurveTo(28,-14, 28,-6, 34,-4);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.bezierCurveTo(-2,18, 8,36, 0,42);
    ctx.bezierCurveTo(-8,48, -18,44, -16,36);
    ctx.bezierCurveTo(-14,28, -6,28, -4,34);
    ctx.stroke();
    ctx.beginPath(); ctx.arc(0,0,3,0,Math.PI*2); ctx.fill();
    [-4,34].forEach(p => { ctx.beginPath(); ctx.arc(p,p,2.5,0,Math.PI*2); ctx.fill(); });
    ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(22,0); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,22); ctx.stroke();
    ctx.restore();
  }
  corner(ctx, 14, 14, 1, 1);
  corner(ctx, 186, 14, -1, 1);
  corner(ctx, 14, 186, 1, -1);
  corner(ctx, 186, 186, -1, -1);
});

mk('Opção 2 — Mandala', (ctx, w, h) => {
  ctx.strokeStyle = '#C9A84C';
  ctx.fillStyle = '#C9A84C';
  function corner(ctx, ox, oy, sx, sy) {
    ctx.save(); ctx.translate(ox, oy); ctx.scale(sx, sy);
    ctx.lineWidth = 1.8;
    ctx.beginPath(); ctx.arc(0, 0, 28, 0, Math.PI/2); ctx.stroke();
    ctx.beginPath(); ctx.arc(0, 0, 20, 0, Math.PI/2); ctx.stroke();
    for(let a=0; a<Math.PI/2; a+=Math.PI/6) {
      const rm=24;
      const x=Math.cos(a+Math.PI/12)*rm, y=Math.sin(a+Math.PI/12)*rm;
      ctx.beginPath(); ctx.arc(x,y,3.5,0,Math.PI*2); ctx.fill();
    }
    ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(30,0); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,30); ctx.stroke();
    ctx.beginPath(); ctx.arc(0,0,4,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
  corner(ctx,12,12,1,1); corner(ctx,188,12,-1,1);
  corner(ctx,12,188,1,-1); corner(ctx,188,188,-1,-1);
});

mk('Opção 3 — Islâmico', (ctx, w, h) => {
  ctx.strokeStyle = '#C9A84C'; ctx.lineWidth = 1.5;
  ctx.fillStyle = '#C9A84C';
  function corner(ctx, ox, oy, sx, sy) {
    ctx.save(); ctx.translate(ox, oy); ctx.scale(sx, sy);
    ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(0,36); ctx.lineTo(0,0); ctx.lineTo(36,0); ctx.stroke();
    ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(0,28); ctx.lineTo(0,8); ctx.quadraticCurveTo(0,0,8,0); ctx.lineTo(28,0); ctx.stroke();
    ctx.lineWidth=1.5;
    ctx.beginPath();
    ctx.moveTo(8,8);
    ctx.bezierCurveTo(8,18, 18,18, 18,8);
    ctx.bezierCurveTo(18,2, 12,0, 8,4);
    ctx.stroke();
    ctx.beginPath(); ctx.arc(18,18,2.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(8,8,2,0,Math.PI*2); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(22,4);
    ctx.bezierCurveTo(30,4,34,10,30,16);
    ctx.bezierCurveTo(26,22,20,20,22,26);
    ctx.stroke();
    ctx.beginPath(); ctx.arc(22,26,2.5,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
  corner(ctx,10,10,1,1); corner(ctx,190,10,-1,1);
  corner(ctx,10,190,1,-1); corner(ctx,190,190,-1,-1);
});

mk('Opção 4 — Barroco', (ctx, w, h) => {
  ctx.strokeStyle='#C9A84C'; ctx.fillStyle='#C9A84C';
  function corner(ctx, ox, oy, sx, sy) {
    ctx.save(); ctx.translate(ox,oy); ctx.scale(sx,sy);
    ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.moveTo(0,40); ctx.lineTo(0,0); ctx.lineTo(40,0); ctx.stroke();
    ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(6,6); ctx.bezierCurveTo(0,16,-6,26,4,30); ctx.bezierCurveTo(10,32,14,24,6,6); ctx.stroke();
    ctx.fill();
    ctx.beginPath(); ctx.moveTo(6,6); ctx.bezierCurveTo(16,0,26,-6,30,4); ctx.bezierCurveTo(32,10,24,14,6,6); ctx.stroke();
    ctx.fill();
    ctx.beginPath(); ctx.moveTo(6,6); ctx.bezierCurveTo(14,14,20,20,26,26); ctx.stroke();
    for(let a=0;a<Math.PI*2;a+=Math.PI/3){
      ctx.beginPath(); ctx.ellipse(26+Math.cos(a)*5,26+Math.sin(a)*5,3,5,a,0,Math.PI*2); ctx.fill();
    }
    ctx.beginPath(); ctx.arc(26,26,3,0,Math.PI*2); ctx.fillStyle='#E8C97A'; ctx.fill(); ctx.fillStyle='#C9A84C';
    ctx.restore();
  }
  corner(ctx,10,10,1,1); corner(ctx,190,10,-1,1);
  corner(ctx,10,190,1,-1); corner(ctx,190,190,-1,-1);
});
</script>
</body>
</html>
